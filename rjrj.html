<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>蜡笔小账本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- 主题与基础样式 --- */
        :root {
            --color-income: #2D5016;
            --color-highlight: #E4A010;
            --color-expense: #C73E1D;
            --color-bg: #FDF6E3;
            --color-text: #4A4A48;
            --color-neutral: #4A4A48;
            --font-hand: 'Comic Neue', cursive;
            --font-body: 'Nunito', sans-serif;
        }

        /* 纸张背景纹理 */
        body {
            background-color: var(--color-bg);
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWDg4N3d3dtbW17e3t1dXWBgYGHh4d5eXlzc3OLi4ubm5uVlZWYmJitbW1xcXFra2tbW1pSUlPZ2dnJyck9PT2AgIBgYGDz8/PNzc2tra2ReVWkAAAAEXRSTlMAw8CQoO/wn5+vr5+fn5+fYG+2tAAAAYZJREFUeNq1wYkBwkAQBMBd9z7f9380xJBoE5s2CpoC+eyzR6c/b2yymijY2QfHhyx/fD8+uXN3pSjl5eXl5eWlTy0Yyie4uLi4uLi4uLi4uLhY3y/fr/RIl9w2Nzc3Nzc3Nzc3Nzc3t7f3L7kE8vPz8/Pz8/Pz8/Pz8/sLpQTy8vLw8PDw8PDw8PDw8PDg4OBg4PDg4OAgIABAQEBAQEBAQEBAQEBAQEBAYGBgYGBgYGBgYGBgYGBgYODg4ODg4ODg4ODg4ODg4ODg4ODg4CAgICAgICAgICAgICAgICAgICBgYGCAgYGBgYGBgYGBgYGBgYCAgICAgICAgICAgICAgICAgICA4GBg4ODg4ODg4ODg4ODg4ODg4ODg4OAgICAgICAgICAgICAgICAgICAgIGBgYGBgYGBgYGBgYGBgYGBgYODg4ODg4ODg4ODg4ODg4ODg4CAgICAgICAgICAgICAgICAgICBgYGCAgYGBgYGBgYGBgYGBgYCAgICAgICAgICAgICAgICAgICA4OBg4ODg4OCg4ODg4ODg4ODg4ODg4ODg4ODg4OCg4ODg4ODg4ODg4OCg4AsoBCH0cwAAAAASUVORK5CYII=');
            font-family: var(--font-body);
            color: var(--color-text);
            padding: 1rem;
        }

        /* --- 核心手绘风格类 --- */
        .hand-drawn-border {
            border: 2px solid var(--color-text);
            /* 制造不规则边框的核心 */
            border-radius: 4px 10px 6px 8px / 8px 5px 9px 5px;
            transition: all 0.2s ease;
        }
        .hand-drawn-shadow {
            /* 模拟蜡笔涂鸦的阴影 */
            box-shadow: 3px 3px 0px var(--color-text);
        }
        .hand-drawn-card {
            background-color: white;
            padding: 1.25rem;
        }
        /* -- FIX: 替换无效的 'composes' 规则 -- */
        .hand-drawn-card, .hand-drawn-button, .hand-drawn-input {
            border: 2px solid var(--color-text);
            border-radius: 4px 10px 6px 8px / 8px 5px 9px 5px;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px var(--color-text);
        }

        /* 动画与交互 */
        @keyframes wobble {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        @keyframes press {
            to {
                transform: translate(2px, 2px);
                box-shadow: 1px 1px 0px var(--color-text);
            }
        }
        @keyframes float-in {
            from {
                opacity: 0;
                transform: translateY(20px) rotate(-2deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(var(--end-rotate, 0deg));
            }
        }
        .animate-float-in {
            animation: float-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* 字体 */
        .font-hand { font-family: var(--font-hand); }
        .font-brand { font-family: var(--font-hand); font-size: 1.75rem; line-height: 2rem; transform: rotate(-1.5deg); }

        /* 按钮 */
        .hand-drawn-button {
            cursor: pointer;
            font-weight: 800;
            transition: all 0.15s ease-out;
            background-color: white;
        }
        .hand-drawn-button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0px var(--color-text); }
        .hand-drawn-button:active { animation: press 0.1s forwards; }

        .btn-highlight { background-color: var(--color-highlight); }
        .btn-danger { background-color: var(--color-expense); color: white; }
        .btn-secondary { background-color: #EAE8E1; }

        /* 输入框 */
        .hand-drawn-input {
            background-color: white;
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            box-shadow: inset 1px 1px 0px rgba(0,0,0,0.1); /* 内阴影模拟凹陷 */
        }
        .hand-drawn-input:focus {
            outline: none;
            box-shadow: 2px 2px 0px var(--color-highlight);
            border-color: var(--color-highlight);
        }
        
        /* SVG 蜡笔填充滤镜 */
        .crayon-fill {
            filter: url(#crayon-texture);
        }

        /* 颜色映射 */
        .positive { color: var(--color-income); }
        .negative { color: var(--color-expense); }
        .neutral { color: var(--color-neutral); }
        
        /* 响应式减弱动画 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
            }
            @keyframes press { to { transform: none; box-shadow: none; } }
            .hand-drawn-button:hover { transform: none; box-shadow: 3px 3px 0px var(--color-text); }
        }

        /* --- 组件重写 --- */

        /* 容器 */
        .container { max-width: 430px; margin: 0 auto; }
        
        /* 顶部导航 */
        .header { 
            animation: float-in 0.5s ease-out;
        }
        .header .icon-btn {
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header .icon-btn.settings { animation: wobble 3s ease-in-out infinite; }
        
        /* 总览卡片 (便签风格) */
        .overview-card {
            background: #fffbef;
            padding: 1rem 1.25rem;
            transform: rotate(-1.5deg);
            --end-rotate: -1.5deg;
            animation-delay: 0.1s;
        }
        .overview-card:hover { transform: rotate(0deg); }
        .stat-value { font-weight: 800; font-size: 1.5rem; }
        .stat-label { font-size: 0.75rem; opacity: 0.8; }
        
        /* 区域标题 */
        .section-title {
            font-family: var(--font-hand); /* -- FIX: from 'composes: font-hand' -- */
            font-size: 1.5rem;
            transform: rotate(-1deg);
        }

        /* 预算卡片 */
        .budget-card {
            --end-rotate: 1deg;
            padding: 1rem;
            position: relative;
        }
        .budget-card.active {
            border-color: var(--color-highlight);
            box-shadow: 3px 3px 0px var(--color-highlight);
            transform: scale(1.02);
        }
        .budget-card.over-budget {
            border-color: var(--color-expense);
            background: #FEF2F2;
        }
        .budget-icon {
            width: 40px;
            height: 40px;
            font-size: 1.25rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            /* -- FIX: from 'composes: hand-drawn-border' -- */
            border: 2px solid var(--color-text);
            border-radius: 4px 10px 6px 8px / 8px 5px 9px 5px;
        }
        .budget-name {
            font-family: var(--font-hand); /* -- FIX: from 'composes: font-hand' -- */
            font-size: 1.25rem;
        }
        .budget-period {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 99px;
            border: 1.5px solid currentColor;
        }
        .remaining { font-size: 1.75rem; font-weight: 800; }
        .total { font-size: 0.8rem; opacity: 0.7; }
        .progress-bar { height: 10px; background: #EAE8E1; overflow: hidden; }
        
        /* 记账区域 */
        #recordArea { transform: rotate(0.5deg); --end-rotate: 0.5deg; }
        #selectedBudgetName { font-size: 1.5rem; font-weight: 800; }
        .currency {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%) rotate(-2deg);
            font-weight: 700;
            color: var(--color-text);
            z-index: 10;
        }
        .amount-input { padding-left: 2.5rem !important; }
        
        /* 支出明细 (网格纸风格) */
        .records-section {
            background-color: #fff;
            background-image:
                linear-gradient(var(--color-text) 1px, transparent 1px),
                linear-gradient(to right, var(--color-text) 1px, #fff 1px);
            background-size: 20px 20px;
            background-position: -1px -1px;
            opacity: 0.2;
            position: absolute;
            top: 0; left: 0; right:0; bottom:0;
            z-index: 0;
            border-radius: inherit;
        }
        .record-item {
            border-bottom: 2px dashed #d1c9b8;
            position: relative;
            z-index: 1;
        }
        .record-item:last-child { border-bottom: none; }
        .record-delete-btn {
            border-color: var(--color-expense);
            color: var(--color-expense);
            font-weight: 800;
            width: 32px;
            height: 32px;
            opacity: 0;
            transition: all 0.2s;
            /* -- FIX: from 'composes: hand-drawn-border' -- */
            border: 2px solid var(--color-text);
            border-radius: 4px 10px 6px 8px / 8px 5px 9px 5px;
        }
        .record-item:hover .record-delete-btn { opacity: 1; }
        .record-delete-btn:active { background: #fde8e4; }

        /* --- 弹窗 (关键修复区域) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background: rgba(74, 74, 72, 0.6);
            backdrop-filter: blur(4px);
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            /* -- FIX: 替换 'composes: hand-drawn-card' -- */
            background-color: white;
            padding: 1.25rem;
            border: 2px solid var(--color-text);
            border-radius: 4px 10px 6px 8px / 8px 5px 9px 5px;
            box-shadow: 3px 3px 0px var(--color-text);
            /* -- 原有样式 -- */
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            animation: float-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .modal-header {
            font-family: var(--font-hand); /* -- FIX: from 'composes: font-hand' -- */
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            transform: rotate(-1deg);
        }
        .icon-option, .color-option {
            cursor: pointer;
            /* -- FIX: from 'composes: hand-drawn-border' -- */
            border: 2px solid var(--color-text);
            border-radius: 4px 10px 6px 8px / 8px 5px 9px 5px;
        }
        .icon-option.selected, .color-option.selected {
            border-color: var(--color-highlight);
            transform: scale(1.1);
            box-shadow: 2px 2px 0 var(--color-highlight);
        }

        /* 提示 */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-text);
            color: white;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
            /* -- FIX: from 'composes: hand-drawn-border' -- */
            border: 2px solid var(--color-text);
            border-radius: 4px 10px 6px 8px / 8px 5px 9px 5px;
        }
        .toast.show {
            top: 50px;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-paper">
    <!-- SVG 滤镜定义 -->
    <svg style="position:absolute; height:0; width:0;">
        <filter id="crayon-texture">
            <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" result="turbulence" />
            <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="container space-y-6">
        <!-- 头部 -->
        <div class="header flex justify-between items-center py-4">
            <div class="text-left">
                <div class="font-brand text-3xl">蜡笔小账本</div>
                <div id="currentDate" class="text-xs opacity-70 font-semibold transform -rotate-1">加载中...</div>
            </div>
            <div class="flex items-center space-x-2">
                 <button class="hand-drawn-button icon-btn settings" onclick="openDataModal()" title="导入/导出">⚙️</button>
                 <button class="hand-drawn-button icon-btn btn-highlight" onclick="openBudgetModal()" title="新建预算">+</button>
            </div>
        </div>

        <!-- 总览 -->
        <div class="overview-card hand-drawn-border hand-drawn-shadow animate-float-in">
            <div class="font-hand text-center text-sm opacity-80 mb-3 transform -rotate-1">本月财务总览</div>
            <div class="flex justify-around text-center">
                <div class="stat-item">
                    <div class="stat-value neutral" id="totalBudget">¥0</div>
                    <div class="stat-label">总预算</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value negative" id="totalSpent">¥0</div>
                    <div class="stat-label">总支出</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value positive" id="totalRemaining">¥0</div>
                    <div class="stat-label">总剩余</div>
                </div>
            </div>
        </div>

        <!-- 预算列表 -->
        <div class="space-y-4 animate-float-in" style="animation-delay: 0.2s;">
            <div class="section-title px-1">📊 我的预算</div>
            <div id="budgetList" class="space-y-4">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 记账区域 -->
        <div id="recordArea" style="display: none;" class="animate-float-in">
            <div class="space-y-4">
                <div class="section-title px-1">📝 记一笔</div>
                <div class="hand-drawn-card">
                    <div class="text-center mb-4 pb-4 border-b-2 border-dashed border-gray-300">
                        <div class="text-sm opacity-70">为预算项目</div>
                        <div id="selectedBudgetName" class="font-hand">--</div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="input-group">
                            <label class="block font-semibold text-sm mb-1 ml-1 -rotate-1">支出项目</label>
                            <input type="text" class="hand-drawn-input" id="recordTitle" placeholder="例如：午餐、打车">
                        </div>
                        
                        <div class="input-group">
                            <label class="block font-semibold text-sm mb-1 ml-1 -rotate-1">支出金额</label>
                            <div class="relative">
                                <span class="currency">¥</span>
                                <input type="number" class="hand-drawn-input amount-input" id="recordAmount" placeholder="0.00" min="0" step="0.01">
                            </div>
                        </div>
                        
                        <button class="hand-drawn-button btn-highlight w-full py-3 text-lg" onclick="addRecord()">确认记账</button>
                    </div>
                </div>
            </div>

            <!-- 支出明细 -->
            <div class="space-y-4 mt-6">
                <div class="section-title px-1">📋 支出明细</div>
                <div class="hand-drawn-card relative">
                    <!-- 网格背景 -->
                    <div class="records-section"></div>
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-3 pb-2 border-b-2 border-dashed border-gray-300">
                            <span class="font-semibold" id="recordsHeaderTitle">近期支出</span>
                            <span class="font-bold text-lg negative" id="recordsTotal">¥0.00</span>
                        </div>
                        <div id="recordsList" class="space-y-2">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 无预算提示 -->
        <div id="noBudgetTip" class="hand-drawn-card text-center py-10 animate-float-in">
            <div class="text-5xl mb-2">✏️</div>
            <div class="font-hand text-xl">还没有设置预算哦</div>
            <div class="text-sm opacity-70 mt-2">点击右上角的 <span class="inline-block px-2 py-0.5 bg-yellow-200 hand-drawn-border transform rotate-3">+</span> 创建一个吧！</div>
        </div>
    </div>

    <!-- 预算设置弹窗 (HTML结构修改) -->
    <div class="modal items-center justify-center p-4" id="budgetModal">
        <div class="modal-box">
            <div class="modal-content">
                <div class="modal-header" id="modalTitle">新建预算</div>
                
                <input type="hidden" id="editBudgetId">
                
                <div class="space-y-4">
                    <div class="input-group">
                        <label class="block font-semibold text-sm mb-1 ml-1 -rotate-1">预算名称</label>
                        <input type="text" class="hand-drawn-input" id="budgetName" placeholder="例如：餐饮、交通">
                    </div>
                    
                    <div class="input-group">
                        <label class="block font-semibold text-sm mb-1 ml-1 -rotate-1">预算金额</label>
                        <div class="relative">
                            <span class="currency">¥</span>
                            <input type="number" class="hand-drawn-input amount-input" id="budgetAmount" placeholder="0.00" min="0" step="0.01">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label class="block font-semibold text-sm mb-1 ml-1 -rotate-1">周期类型</label>
                        <select class="hand-drawn-input" id="budgetPeriod">
                            <option value="daily">每日预算</option>
                            <option value="monthly">每月预算</option>
                            <option value="yearly">每年预算</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label class="block font-semibold text-sm mb-1 ml-1 -rotate-1">选择图标</label>
                        <div class="icon-selector grid grid-cols-6 gap-2" id="iconSelector"></div>
                        <input type="hidden" id="selectedIcon" value="🍔">
                    </div>
                    
                    <div class="input-group">
                        <label class="block font-semibold text-sm mb-1 ml-1 -rotate-1">选择颜色</label>
                        <div class="color-selector flex flex-wrap gap-3" id="colorSelector"></div>
                        <input type="hidden" id="selectedColor" value="#667eea">
                    </div>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <button class="hand-drawn-button btn-secondary w-full py-3" onclick="closeBudgetModal()">取消</button>
                    <button class="hand-drawn-button btn-highlight w-full py-3" onclick="saveBudget()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 数据导入导出弹窗 (HTML结构修改) -->
    <div class="modal items-center justify-center p-4" id="dataModal">
        <div class="modal-box">
            <div class="modal-content">
                <div class="modal-header">💾 数据备份</div>
                
                <div class="mb-6">
                    <div class="font-semibold mb-2 -rotate-1">导出数据</div>
                    <button class="hand-drawn-button bg-green-500 text-white w-full py-3 text-base flex items-center justify-center gap-2" onclick="exportData()">
                        <span>📥</span>
                        <span>导出到文件</span>
                    </button>
                    <div class="text-xs text-center opacity-70 mt-2">将备份文件保存到安全的地方，防止数据丢失。</div>
                </div>

                <div class="mt-6">
                    <div class="font-semibold mb-2 -rotate-1">导入数据</div>
                    <div class="hand-drawn-border border-dashed border-gray-400 text-center py-6 cursor-pointer transition-transform hover:scale-105" onclick="document.getElementById('fileInput').click()">
                        <div class="text-4xl">📤</div>
                        <div class="font-bold mt-1">点击选择备份文件</div>
                        <div class="text-xs opacity-70">支持 .json 格式</div>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept=".json,application/json" onchange="importData(this)">
                    <div class="text-xs text-center text-red-600 font-bold mt-2">⚠️ 导入将覆盖当前所有数据，请谨慎操作！</div>
                </div>
                
                <div class="mt-8">
                    <button class="hand-drawn-button btn-secondary w-full py-3" onclick="closeDataModal()">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示 -->
    <div class="toast" id="toast"></div>

    <script>
    // ==================== 数据管理 (未修改，完全兼容) ====================

    const ICONS = ['🍔', '🚗', '🛍️', '🏠', '🎮', '📚', '💊', '🐱', '✈️', '🎁', '💄', '⚽', '🎵', '💻', '☕', '🍎', '👕', '🔧'];
    const COLORS = ['#667eea', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', ' #ec4899', '#06b6d4', '#84cc16'];

    function getData() {
        try {
            const data = localStorage.getItem('multiBudgetData');
            if (data) {
                const parsed = JSON.parse(data);
                if (!parsed.budgets || !Array.isArray(parsed.budgets)) parsed.budgets = [];
                if (!parsed.records || !Array.isArray(parsed.records)) parsed.records = [];
                if (typeof parsed.selectedBudgetId === 'undefined') parsed.selectedBudgetId = null;
                return parsed;
            }
        } catch (e) {
            console.error("数据解析失败:", e);
        }
        return { budgets: [], records: [], selectedBudgetId: null };
    }

    function saveData(data) {
        localStorage.setItem('multiBudgetData', JSON.stringify(data));
    }

    function calculateSpentOnDate(budgetId, dateKey, records) {
        return records
            .filter(r => r.budgetId === budgetId && r.dateKey === dateKey)
            .reduce((sum, r) => sum + r.amount, 0);
    }
    
    function recalculateAllSpent(data, dateInfo) {
        data.budgets.forEach(budget => {
            let currentPeriodRecords;
            switch(budget.period) {
                case 'daily':
                    currentPeriodRecords = data.records.filter(r => r.budgetId === budget.id && r.dateKey === dateInfo.dateKey);
                    break;
                case 'monthly':
                    currentPeriodRecords = data.records.filter(r => r.budgetId === budget.id && r.dateKey.startsWith(dateInfo.monthKey));
                    break;
                case 'yearly':
                    currentPeriodRecords = data.records.filter(r => r.budgetId === budget.id && r.dateKey.startsWith(dateInfo.yearKey));
                    break;
                default:
                    currentPeriodRecords = [];
            }
            budget.spent = currentPeriodRecords.reduce((sum, r) => sum + r.amount, 0);
        });
        console.log("数据校准：所有预算的当前周期已用金额已同步。");
    }

    // ==================== 日期处理 (未修改，完全兼容) ====================

    function getDateInfo() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        
        return {
            year, month, date,
            dayName: days[now.getDay()],
            fullDate: `${year}年${month}月${date}日 星期${days[now.getDay()]}`,
            dateKey: `${year}-${month}-${date}`,
            monthKey: `${year}-${month}`,
            yearKey: `${year}`,
            timestamp: now.getTime(),
            timeStr: `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`
        };
    }

    function getYesterdayDateKey(today) {
        const yesterday = new Date(today.getTime() - 24 * 60 * 60 * 1000);
        return `${yesterday.getFullYear()}-${yesterday.getMonth() + 1}-${yesterday.getDate()}`;
    }

    // ==================== 周期重置与继承 (未修改，完全兼容) ====================

    function checkAndApplyResets(data, dateInfo) {
        let hasAnyReset = false;
        const today = new Date();
        
        data.budgets.forEach(budget => {
            const lastCheck = budget.lastCheck || '';
            let needsReset = false;
            let newLastCheck = '';

            switch(budget.period) {
                case 'daily': 
                    needsReset = lastCheck !== dateInfo.dateKey; 
                    newLastCheck = dateInfo.dateKey;
                    break;
                case 'monthly': 
                    needsReset = !lastCheck.startsWith(dateInfo.monthKey); 
                    newLastCheck = dateInfo.monthKey;
                    break;
                case 'yearly': 
                    needsReset = !lastCheck.startsWith(dateInfo.yearKey); 
                    newLastCheck = dateInfo.yearKey;
                    break;
            }

            if (needsReset) {
                hasAnyReset = true;
                if (budget.period === 'daily') {
                    if (!lastCheck) {
                        budget.carryOver = 0;
                        budget.todayLimit = budget.amount;
                    } else {
                        const lastDate = new Date(lastCheck);
                        const todayDate = new Date(dateInfo.dateKey);
                        const diffTime = todayDate.getTime() - lastDate.getTime();
                        const diffDays = Math.floor(diffTime / (24 * 60 * 60 * 1000));
                        
                        if (diffDays <= 0) {
                            budget.carryOver = 0;
                            budget.todayLimit = budget.amount;
                        } else {
                            const lastDaySpent = calculateSpentOnDate(budget.id, lastCheck, data.records);
                            const lastDayLimit = budget.todayLimit || budget.amount;
                            const lastDayRemaining = lastDayLimit - lastDaySpent;
                            const missedDays = diffDays - 1;
                            const totalCarryOver = lastDayRemaining + (budget.amount * missedDays);
                            budget.carryOver = totalCarryOver;
                            budget.todayLimit = budget.amount + totalCarryOver;
                        }
                    }
                } else {
                    budget.carryOver = 0;
                    budget.todayLimit = budget.amount;
                }
                budget.spent = 0;
                budget.lastCheck = newLastCheck;
            }
        });
        
        return hasAnyReset;
    }

    // ==================== 初始化与渲染 (逻辑未修改，仅调整HTML生成以匹配新样式) ====================
    
    function init() {
        updateDate();
        renderIconSelector();
        renderColorSelector();
        
        const data = getData();
        const dateInfo = getDateInfo();
        const hasReset = checkAndApplyResets(data, dateInfo);
        
        if (hasReset) {
            saveData(data);
        }
        
        renderBudgetList();
        updateOverview();
        startDateWatcher();
    }

    let dateWatcherInterval = null;
    function startDateWatcher() {
        if (dateWatcherInterval) clearInterval(dateWatcherInterval);
        let lastDateKey = getDateInfo().dateKey;
        dateWatcherInterval = setInterval(() => {
            const currentKey = getDateInfo().dateKey;
            if (currentKey !== lastDateKey) {
                lastDateKey = currentKey;
                init();
            }
        }, 30000);
    }

    function updateDate() {
        const el = document.getElementById('currentDate');
        el.textContent = getDateInfo().fullDate;
    }

    function renderIconSelector() {
        const container = document.getElementById('iconSelector');
        if (!container) return;
        container.innerHTML = ICONS.map(icon => 
            `<div class="icon-option flex items-center justify-center text-2xl ${icon === '🍔' ? 'selected' : ''}" onclick="selectIcon('${icon}', this)">${icon}</div>`
        ).join('');
    }

    function renderColorSelector() {
        const container = document.getElementById('colorSelector');
        if (!container) return;
        container.innerHTML = COLORS.map(color => 
            `<div class="color-option w-10 h-10 rounded-full ${color === '#667eea' ? 'selected' : ''}" style="background: ${color}" onclick="selectColor('${color}', this)"></div>`
        ).join('');
    }

    function selectIcon(icon, el) {
        document.querySelectorAll('.icon-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('selectedIcon').value = icon;
    }

    function selectColor(color, el) {
        document.querySelectorAll('.color-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('selectedColor').value = color;
    }

    function renderBudgetList() {
        const data = getData();
        const container = document.getElementById('budgetList');
        
        if (data.budgets.length === 0) {
            container.innerHTML = '';
            document.getElementById('noBudgetTip').style.display = 'block';
            document.getElementById('recordArea').style.display = 'none';
            updateOverview();
            return;
        }
        
        document.getElementById('noBudgetTip').style.display = 'none';
        
        container.innerHTML = data.budgets.map((budget, index) => {
            const spent = budget.spent || 0;
            let totalLimit = (budget.period === 'daily') ? (budget.todayLimit || budget.amount) : budget.amount;
            if (isNaN(totalLimit)) totalLimit = budget.amount;
            
            const remaining = totalLimit - spent;
            const percent = totalLimit > 0 ? (spent / totalLimit * 100) : (spent > 0 ? 100 : 0);
            
            let progressClass = 'bg-green-500';
            if (percent > 80) progressClass = 'bg-yellow-500';
            if (percent >= 100) progressClass = 'bg-red-500';
            
            const isSelected = data.selectedBudgetId === budget.id;
            
            let carryOverHtml = '';
            if (budget.period === 'daily' && typeof budget.carryOver === 'number' && budget.carryOver !== 0) {
                const color = budget.carryOver > 0 ? 'var(--color-income)' : 'var(--color-expense)';
                const sign = budget.carryOver > 0 ? '+' : '';
                carryOverHtml = `<span style="font-size: 0.7rem; color: ${color}; font-weight: 600;">(继承${sign}¥${budget.carryOver.toFixed(0)})</span>`;
            }
            
            const randomRotate = `transform: rotate(${(index % 2 === 0 ? 1 : -1) * (1 + index * 0.1)}deg)`;

            return `
                <div class="budget-card hand-drawn-card ${isSelected ? 'active' : ''} ${remaining < 0 ? 'over-budget' : ''} animate-float-in" style="--end-rotate: ${(index % 2 === 0 ? 1 : -1) * 0.5}deg; animation-delay: ${index * 0.05}s;" onclick="selectBudget('${budget.id}')">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="budget-icon" style="background: ${budget.color}20;">
                               <span style="transform: rotate(${(index % 2 === 0 ? -2 : 2)}deg);">${budget.icon}</span>
                            </div>
                            <div class="budget-name">${escapeHtml(budget.name)}</div>
                        </div>
                        <span class="budget-period" style="color: ${budget.color}">${getPeriodText(budget.period)}</span>
                    </div>
                    <div class="flex justify-between items-baseline mb-2">
                        <div class="flex items-baseline gap-2">
                            <span class="remaining ${remaining >= 0 ? 'positive' : 'negative'}">¥${remaining.toFixed(2)}</span>
                            <span class="total">/ ¥${totalLimit.toFixed(2)}</span>
                        </div>
                        ${carryOverHtml}
                    </div>
                    <div class="progress-bar hand-drawn-border">
                        <div class="h-full crayon-fill ${progressClass}" style="width: ${Math.min(percent, 100)}%"></div>
                    </div>
                    <div class="text-xs opacity-80 flex justify-between mt-2 px-1">
                        <span>已用: ¥${spent.toFixed(2)}</span>
                        <span>${percent.toFixed(0)}%</span>
                    </div>
                    ${isSelected ? `
                        <div class="flex gap-3 mt-4 pt-3 border-t-2 border-dashed border-gray-200">
                            <button class="hand-drawn-button w-full py-2" onclick="event.stopPropagation(); editBudget('${budget.id}')">编辑</button>
                            <button class="hand-drawn-button btn-danger w-full py-2" onclick="event.stopPropagation(); deleteBudget('${budget.id}')">删除</button>
                        </div>
                    ` : ''} 
                </div>`;
        }).join('');
        
        const selectedExists = data.selectedBudgetId && data.budgets.some(b => b.id === data.selectedBudgetId);
        if (selectedExists) {
            const selected = data.budgets.find(b => b.id === data.selectedBudgetId);
            document.getElementById('recordArea').style.display = 'block';
            document.getElementById('selectedBudgetName').textContent = selected.name;
            document.getElementById('selectedBudgetName').style.color = selected.color;
            renderRecordsList();
        } else {
            document.getElementById('recordArea').style.display = 'none';
            if (data.budgets.length > 0) {
                selectBudget(data.budgets[0].id);
            }
        }
    }

    function getPeriodText(period) {
        const map = { daily: '每日', monthly: '每月', yearly: '每年' };
        return map[period] || period;
    }

    function selectBudget(id) {
        const data = getData();
        data.selectedBudgetId = id;
        saveData(data);
        renderBudgetList();
    }

    function updateOverview() {
        const data = getData();
        const dateInfo = getDateInfo();

        const todaySpent = data.records
            .filter(r => r.dateKey === dateInfo.dateKey)
            .reduce((sum, r) => sum + r.amount, 0);
        
        let todayAvailable = 0;
        data.budgets.forEach(b => {
            if (b.period === 'daily') {
                todayAvailable += (b.todayLimit || b.amount);
            }
        });
        
        document.getElementById('totalBudget').textContent = '¥' + todayAvailable.toFixed(0);
        document.getElementById('totalSpent').textContent = '¥' + todaySpent.toFixed(0);
        document.getElementById('totalRemaining').textContent = '¥' + (todayAvailable - todaySpent).toFixed(0);
    }
    
    // ==================== 预算编辑 (未修改，完全兼容) ====================

    function openBudgetModal(budgetId = null) {
        const modal = document.getElementById('budgetModal');
        const title = document.getElementById('modalTitle');
        
        document.getElementById('editBudgetId').value = '';
        document.getElementById('budgetName').value = '';
        document.getElementById('budgetAmount').value = '';
        document.getElementById('budgetPeriod').value = 'monthly';
        document.getElementById('selectedIcon').value = '🍔';
        document.getElementById('selectedColor').value = '#667eea';
        
        renderIconSelector();
        renderColorSelector();
        
        if (budgetId) {
            const data = getData();
            const budget = data.budgets.find(b => b.id === budgetId);
            if (!budget) return;
            
            title.textContent = '编辑预算';
            document.getElementById('editBudgetId').value = budgetId;
            document.getElementById('budgetName').value = budget.name;
            document.getElementById('budgetAmount').value = budget.amount;
            document.getElementById('budgetPeriod').value = budget.period;
            document.getElementById('selectedIcon').value = budget.icon;
            document.getElementById('selectedColor').value = budget.color;
            
            document.querySelectorAll('.icon-option').forEach(el => {
                el.classList.toggle('selected', el.textContent === budget.icon);
            });
            document.querySelectorAll('.color-option').forEach(el => {
                const bg = rgbToHex(el.style.backgroundColor);
                el.classList.toggle('selected', bg === budget.color);
            });
        } else {
            title.textContent = '新建预算';
        }
        modal.classList.add('show');
    }

    function closeBudgetModal() {
        document.getElementById('budgetModal').classList.remove('show');
    }

    function saveBudget() {
        const id = document.getElementById('editBudgetId').value;
        const name = document.getElementById('budgetName').value.trim();
        const amount = parseFloat(document.getElementById('budgetAmount').value);
        const period = document.getElementById('budgetPeriod').value;
        const icon = document.getElementById('selectedIcon').value;
        const color = document.getElementById('selectedColor').value;

        if (!name || isNaN(amount) || amount < 0) {
            showToast('请输入有效的预算名称和金额');
            return;
        }
        
        const data = getData();
        const dateInfo = getDateInfo();
        
        if (id) {
            const budget = data.budgets.find(b => b.id === id);
            if (budget) {
                const oldAmount = budget.amount;
                budget.name = name;
                budget.amount = amount;
                budget.period = period;
                budget.icon = icon;
                budget.color = color;
                
                if (budget.period === 'daily' && oldAmount !== amount) {
                    const currentCarryOver = budget.carryOver || 0;
                    budget.todayLimit = amount + currentCarryOver;
                }
            }
        } else {
            const newBudget = {
                id: Date.now().toString(),
                name, amount, period, icon, color,
                createdAt: dateInfo.dateKey,
                lastCheck: '', spent: 0, carryOver: 0, todayLimit: amount
            };
            data.budgets.push(newBudget);
            data.selectedBudgetId = newBudget.id;
        }

        saveData(data);
        closeBudgetModal();
        init();
        showToast(id ? '预算已更新' : '预算已创建');
    }

    function editBudget(id) {
        openBudgetModal(id);
    }

    function deleteBudget(id) {
        if (!confirm('确定要删除这个预算吗？相关的记账记录也会被删除。')) return;
        
        const data = getData();
        data.budgets = data.budgets.filter(b => b.id !== id);
        data.records = data.records.filter(r => r.budgetId !== id);
        
        if (data.selectedBudgetId === id) {
            data.selectedBudgetId = data.budgets.length > 0 ? data.budgets[0].id : null;
        }
        
        saveData(data);
        renderBudgetList();
        updateOverview();
        showToast('预算已删除');
    }

    // ==================== 数据导入导出 (未修改，完全兼容) ====================

    function openDataModal() { document.getElementById('dataModal').classList.add('show'); }
    function closeDataModal() { document.getElementById('dataModal').classList.remove('show'); document.getElementById('fileInput').value = ''; }

    function exportData() {
        const data = getData();
        const exportObj = { version: '2.0', exportTime: new Date().toISOString(), data: data };
        const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `蜡笔账本备份_${getDateInfo().dateKey}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('导出成功');
        closeDataModal();
    }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                const dataToImport = imported.data || imported;
                if (!Array.isArray(dataToImport.budgets) || !Array.isArray(dataToImport.records)) {
                    throw new Error('数据格式错误');
                }
                if (!confirm(`确定要导入备份吗？这将覆盖当前所有数据！`)) { 
                    input.value = ''; return; 
                }
                saveData(dataToImport);
                recalculateAllSpent(dataToImport, getDateInfo());
                saveData(dataToImport);
                init();
                showToast('✅ 导入成功');
                closeDataModal();
            } catch (err) {
                showToast('❌ 导入失败：' + err.message);
                input.value = '';
            }
        };
        reader.readAsText(file);
    }

    // ==================== 记账功能 (逻辑未修改，仅调整HTML生成以匹配新样式) ====================

    function addRecord() {
        const data = getData();
        if (!data.selectedBudgetId) { showToast('请先选择一个预算'); return; }
        
        const title = document.getElementById('recordTitle').value.trim();
        const amount = parseFloat(document.getElementById('recordAmount').value);
        
        if (!title || isNaN(amount) || amount <= 0) {
            showToast('请输入有效的项目和金额');
            return;
        }
        
        const budget = data.budgets.find(b => b.id === data.selectedBudgetId);
        if (!budget) return;
        
        const dateInfo = getDateInfo();
        
        const record = {
            id: Date.now().toString(),
            budgetId: data.selectedBudgetId,
            title, amount,
            dateKey: dateInfo.dateKey,
            timestamp: dateInfo.timestamp,
            timeStr: dateInfo.timeStr
        };
        data.records.push(record);
        budget.spent = (budget.spent || 0) + amount;
        saveData(data);
        
        document.getElementById('recordTitle').value = '';
        document.getElementById('recordAmount').value = '';
        renderBudgetList();
        renderRecordsList();
        updateOverview();
        showToast('记账成功');
    }

    function deleteRecord(recordId) {
        if (!confirm('确定要删除这条支出记录吗？')) return;
        
        const data = getData();
        const index = data.records.findIndex(r => r.id === recordId);
        if (index === -1) return;
        
        const record = data.records[index];
        const budget = data.budgets.find(b => b.id === record.budgetId);
        
        if (budget) {
            budget.spent = (budget.spent || 0) - record.amount;
            if (budget.spent < 0) budget.spent = 0; 
        }
        
        data.records.splice(index, 1);
        saveData(data);
        renderBudgetList();
        renderRecordsList();
        updateOverview();
        showToast('记录已删除');
    }

    function renderRecordsList() {
        const data = getData();
        const container = document.getElementById('recordsList');
        if (!container || !data.selectedBudgetId) return;
        
        const budget = data.budgets.find(b => b.id === data.selectedBudgetId);
        if (!budget) { container.innerHTML = ''; return; }
        
        const headerTitle = document.getElementById('recordsHeaderTitle');
        if (headerTitle) headerTitle.textContent = `${getPeriodText(budget.period)}支出`;

        const dateInfo = getDateInfo();
        let recordsToShow = [];
        
        if (budget.period === 'daily') {
            recordsToShow = data.records.filter(r => r.budgetId === budget.id && r.dateKey === dateInfo.dateKey);
        } else if (budget.period === 'monthly') {
            recordsToShow = data.records.filter(r => r.budgetId === budget.id && r.dateKey.startsWith(dateInfo.monthKey));
        } else if (budget.period === 'yearly') {
            recordsToShow = data.records.filter(r => r.budgetId === budget.id && r.dateKey.startsWith(dateInfo.yearKey));
        }
        
        recordsToShow.sort((a, b) => b.timestamp - a.timestamp);
        
        const total = recordsToShow.reduce((s, r) => s + r.amount, 0);
        const recordsTotalEl = document.getElementById('recordsTotal');
        if (recordsTotalEl) recordsTotalEl.textContent = '¥' + total.toFixed(2);
        
        if (recordsToShow.length === 0) {
            container.innerHTML = `<div class="text-center py-8"><div class="text-4xl mb-2">🎨</div><div class="font-semibold opacity-70">当前周期暂无支出</div></div>`;
            return;
        }
        
        container.innerHTML = recordsToShow.map(r => `
            <div class="record-item flex items-center justify-between py-3">
                <div class="flex items-center gap-3">
                    <div class="text-xl">✏️</div>
                    <div>
                        <div class="font-semibold leading-tight">${escapeHtml(r.title)}</div>
                        <div class="text-xs opacity-60">${r.timeStr}</div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="font-bold negative text-base">-¥${r.amount.toFixed(2)}</div>
                    <button class="record-delete-btn flex items-center justify-center" onclick="deleteRecord('${r.id}')" title="删除">X</button>
                </div>
            </div>
        `).join('');
    }

    // ==================== 工具函数 (未修改，完全兼容) ====================

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function rgbToHex(rgb) {
        if (!rgb || rgb.startsWith('#')) return rgb;
        if (!rgb.startsWith('rgb')) return rgb;
        const result = rgb.match(/\d+/g);
        if (!result || result.length < 3) return rgb;
        return '#' + result.slice(0, 3).map(x => {
            const hex = parseInt(x).toString(16);
            return hex.length === 1 ? '0' + hex : hex;
        }).join('');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    document.getElementById('budgetModal').addEventListener('click', e => { 
        if (e.target.id === 'budgetModal') closeBudgetModal(); 
    });

    document.getElementById('dataModal').addEventListener('click', e => { 
        if (e.target.id === 'dataModal') closeDataModal();
    });

    window.onload = init;
    </script>
